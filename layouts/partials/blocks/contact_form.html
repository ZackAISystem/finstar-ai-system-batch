<section class="contact-form" id="contact">
  <div class="container contact-form__container">

    <div class="contact-form__panel">

      <!-- LEFT: circle + image -->
      <div class="contact-form__left" aria-hidden="true">
        <div class="contact-form__circle"></div>

        <img
          class="contact-form__img"
          src="/img/template_1/contact/cta-house.png"
          alt=""
          loading="lazy"
        >
      </div>

      <!-- RIGHT: text + button -->
      <div class="contact-form__right">
        <h2 class="contact-form__title">{{ .contact_form_title_agent }}</h2>

        <p class="contact-form__text">
          {{ .contact_form_text_agent }}
        </p>

        <a
  class="contact-form__btn js-open-lead"
  href="#contact"
  data-source="contact_form"
  data-modal-title="{{ .contact_form_title_agent }}"
  data-cta-text="{{ .contact_form_button_text_fixed }}"
  data-cta-color="var(--contact-panel-bg)"
>
  {{ .contact_form_button_text_fixed }}
</a>
      </div>

    </div>
  </div>
</section>
