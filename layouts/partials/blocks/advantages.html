<section class="advantages" id="advantages">
  <div class="container advantages__container">

    <h2 class="advantages__title">
      {{ .advantages_intro_text }}
    </h2>

    <div class="advantages__grid">

      <!-- Card 1 -->
      <article class="adv-card">
        <div class="adv-card__iconbox">
          <img src="/img/template_1/advantages/icon-briefcase.png" alt="" aria-hidden="true" loading="lazy">
        </div>

        <div class="adv-card__body">
          <div class="adv-card__label">{{ .advantages_1_title_fixed }}</div>
          <div class="adv-card__value">{{ .advantages_1_value_fixed }}</div>
        </div>
      </article>

      <!-- Card 2 -->
      <article class="adv-card">
        <div class="adv-card__iconbox">
          <img src="/img/template_1/advantages/icon-jar.png" alt="" aria-hidden="true" loading="lazy">
        </div>

        <div class="adv-card__body">
          <div class="adv-card__label">{{ .advantages_2_title_fixed }}</div>
          <div class="adv-card__value">{{ .advantages_2_value_fixed }}</div>
        </div>
      </article>

      <!-- Card 3 -->
      <article class="adv-card">
        <div class="adv-card__iconbox">
          <img src="/img/template_1/advantages/icon-tools.png" alt="" aria-hidden="true" loading="lazy">
        </div>

        <div class="adv-card__body">
          <div class="adv-card__label">{{ .advantages_3_title_fixed }}</div>
          <div class="adv-card__value">{{ .advantages_3_value_fixed }}</div>
        </div>
      </article>

    </div>
  </div>
</section>
